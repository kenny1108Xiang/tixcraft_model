<svg viewBox="0 0 680 960" xmlns="http://www.w3.org/2000/svg">
  <title>Tixcraft Model Pipeline - English</title>
  <desc>
    Complete pipeline architecture from synthetic data generation and pretraining to fine-tuning
  </desc>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="m2 1 6 4-6 4" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="20" y="40" width="640" height="200" rx="14" fill="#e1f5ee" stroke="#0f6e56" stroke-width=".5"/>
  <text font-family="sans-serif" font-size="14" font-weight="600" fill="#085041" x="340" y="68" text-anchor="middle">Phase 1 — data preparation</text>
  <rect x="40" y="90" width="180" height="56" rx="8" fill="#9fe1cb" stroke="#0f6e56" stroke-width=".5"/>
  <text font-family="sans-serif" font-size="14" font-weight="600" fill="#085041" x="130" y="113" text-anchor="middle" dominant-baseline="central">create_img.py</text>
  <text font-family="sans-serif" font-size="12" fill="#0f6e56" x="130" y="133" text-anchor="middle" dominant-baseline="central">synthetic images</text>
  <rect x="460" y="90" width="180" height="56" rx="8" fill="#9fe1cb" stroke="#0f6e56" stroke-width=".5"/>
  <text font-family="sans-serif" font-size="14" font-weight="600" fill="#085041" x="550" y="113" text-anchor="middle" dominant-baseline="central">real_img/</text>
  <text font-family="sans-serif" font-size="12" fill="#0f6e56" x="550" y="133" text-anchor="middle" dominant-baseline="central">real captchas</text>
  <rect x="240" y="90" width="200" height="56" rx="8" fill="#d3d1c7" stroke="#5f5e5a" stroke-width=".5"/>
  <text font-family="sans-serif" font-size="14" font-weight="600" fill="#2c2c2a" x="340" y="113" text-anchor="middle" dominant-baseline="central">dataset.py</text>
  <text font-family="sans-serif" font-size="12" fill="#5f5e5a" x="340" y="133" text-anchor="middle" dominant-baseline="central">Resize ➞ 32×128, augment</text>
  <path stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#a)" d="M220 118h15"/>
  <path stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#a)" d="M460 118h-15"/>
  <rect x="40" y="175" width="100" height="44" rx="6" fill="#9fe1cb" stroke="#0f6e56" stroke-width=".5"/>
  <text font-family="sans-serif" font-size="12" font-weight="600" fill="#085041" x="90" y="197" text-anchor="middle" dominant-baseline="central">train (80%)</text>
  <rect x="150" y="175" width="90" height="44" rx="6" fill="#9fe1cb" stroke="#0f6e56" stroke-width=".5"/>
  <text font-family="sans-serif" font-size="12" font-weight="600" fill="#085041" x="195" y="197" text-anchor="middle" dominant-baseline="central">val (10%)</text>
  <rect x="250" y="175" width="90" height="44" rx="6" fill="#9fe1cb" stroke="#0f6e56" stroke-width=".5"/>
  <text font-family="sans-serif" font-size="12" font-weight="600" fill="#085041" x="295" y="197" text-anchor="middle" dominant-baseline="central">test (10%)</text>
  <rect x="460" y="175" width="180" height="44" rx="6" fill="#9fe1cb" stroke="#0f6e56" stroke-width=".5"/>
  <text font-family="sans-serif" font-size="12" font-weight="600" fill="#085041" x="550" y="197" text-anchor="middle" dominant-baseline="central">real_img/ (all)</text>
  <path stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#a)" d="m280 146-170 26"/>
  <path stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#a)" d="m320 146-110 26"/>
  <path stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#a)" d="m360 146-50 26"/>
  <path stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#a)" d="M550 146v26"/>
  <path stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#a)" d="M340 240v25"/>
  <rect x="20" y="270" width="640" height="420" rx="14" fill="#eeedfe" stroke="#534ab7" stroke-width=".5"/>
  <text font-family="sans-serif" font-size="14" font-weight="600" fill="#26215c" x="340" y="298" text-anchor="middle">Phase 2 — model architecture</text>
  <rect x="200" y="320" width="280" height="44" rx="8" fill="#d3d1c7" stroke="#5f5e5a" stroke-width=".5"/>
  <text font-family="sans-serif" font-size="14" font-weight="600" fill="#2c2c2a" x="340" y="342" text-anchor="middle" dominant-baseline="central">Input (B, 1, 32, 128)</text>
  <path stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#a)" d="M340 364v21"/>
  <rect x="180" y="390" width="320" height="56" rx="8" fill="#cecbf6" stroke="#534ab7" stroke-width=".5"/>
  <text font-family="sans-serif" font-size="14" font-weight="600" fill="#26215c" x="340" y="413" text-anchor="middle" dominant-baseline="central">CNN backbone</text>
  <text font-family="sans-serif" font-size="12" fill="#3c3489" x="340" y="433" text-anchor="middle" dominant-baseline="central">4 conv blocks ➞ (B, 256, 1, 16)</text>
  <path stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#a)" d="M340 446v19"/>
  <rect x="180" y="470" width="320" height="50" rx="8" fill="#cecbf6" stroke="#534ab7" stroke-width=".5"/>
  <text font-family="sans-serif" font-size="14" font-weight="600" fill="#26215c" x="340" y="490" text-anchor="middle" dominant-baseline="central">Transformer encoder</text>
  <text font-family="sans-serif" font-size="12" fill="#3c3489" x="340" y="508" text-anchor="middle" dominant-baseline="central">3 layers, d_model=256</text>
  <path stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#a)" d="M340 520v25"/>
  <rect x="515" y="550" width="115" height="50" rx="8" fill="#f5c4b3" stroke="#993c1d" stroke-width=".5"/>
  <text font-family="sans-serif" font-size="14" font-weight="600" fill="#4a1b0c" x="572" y="570" text-anchor="middle" dominant-baseline="central">4 learnable</text>
  <text font-family="sans-serif" font-size="12" fill="#712b13" x="572" y="588" text-anchor="middle" dominant-baseline="central">queries</text>
  <rect x="180" y="550" width="320" height="50" rx="8" fill="#cecbf6" stroke="#534ab7" stroke-width=".5"/>
  <text font-family="sans-serif" font-size="14" font-weight="600" fill="#26215c" x="340" y="570" text-anchor="middle" dominant-baseline="central">Transformer decoder</text>
  <text font-family="sans-serif" font-size="12" fill="#3c3489" x="340" y="588" text-anchor="middle" dominant-baseline="central">3 layers, cross-attention</text>
  <path stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#a)" d="M515 575h-10"/>
  <path stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#a)" d="M340 600v25"/>
  <rect x="200" y="630" width="280" height="44" rx="8" fill="#d3d1c7" stroke="#5f5e5a" stroke-width=".5"/>
  <text font-family="sans-serif" font-size="14" font-weight="600" fill="#2c2c2a" x="340" y="652" text-anchor="middle" dominant-baseline="central">Output (4 positions × 26 classes)</text>
  <path stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#a)" d="M340 690v25"/>
  <rect x="20" y="720" width="640" height="210" rx="14" fill="#faeeda" stroke="#854f0b" stroke-width=".5"/>
  <text font-family="sans-serif" font-size="14" font-weight="600" fill="#412402" x="340" y="748" text-anchor="middle">Phase 3 — training</text>
  <text font-family="sans-serif" font-size="12" fill="#854f0b" x="340" y="768" text-anchor="middle">Cross-entropy loss (4 positions summed)</text>
  <rect x="40" y="780" width="260" height="60" rx="8" fill="#fac775" stroke="#854f0b" stroke-width=".5"/>
  <text font-family="sans-serif" font-size="14" font-weight="600" fill="#412402" x="170" y="803" text-anchor="middle" dominant-baseline="central">Pretrain (train.py)</text>
  <text font-family="sans-serif" font-size="12" fill="#633806" x="170" y="823" text-anchor="middle" dominant-baseline="central">Synthetic data, 50 epochs</text>
  <rect x="380" y="780" width="240" height="60" rx="8" fill="#fac775" stroke="#854f0b" stroke-width=".5"/>
  <text font-family="sans-serif" font-size="14" font-weight="600" fill="#412402" x="500" y="803" text-anchor="middle" dominant-baseline="central">Finetune (finetune.py)</text>
  <text font-family="sans-serif" font-size="12" fill="#633806" x="500" y="823" text-anchor="middle" dominant-baseline="central">Real img, 60 epochs</text>
  <path stroke="#854f0b" stroke-width="1.5" marker-end="url(#a)" d="M300 810h75"/>
  <rect x="40" y="870" width="260" height="44" rx="8" fill="#d3d1c7" stroke="#5f5e5a" stroke-width=".5"/>
  <text font-family="sans-serif" font-size="14" font-weight="600" fill="#2c2c2a" x="170" y="888" text-anchor="middle" dominant-baseline="central">best_pretrain.pth</text>
  <text font-family="sans-serif" font-size="12" fill="#5f5e5a" x="170" y="904" text-anchor="middle" dominant-baseline="central">Best validation accuracy</text>
  <rect x="380" y="870" width="240" height="44" rx="8" fill="#d3d1c7" stroke="#5f5e5a" stroke-width=".5"/>
  <text font-family="sans-serif" font-size="14" font-weight="600" fill="#2c2c2a" x="500" y="888" text-anchor="middle" dominant-baseline="central">best_finetune.pth</text>
  <text font-family="sans-serif" font-size="12" fill="#5f5e5a" x="500" y="904" text-anchor="middle" dominant-baseline="central">Best real accuracy</text>
  <path stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#a)" d="M170 840v25"/>
  <path stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#a)" d="M500 840v25"/>
</svg>
