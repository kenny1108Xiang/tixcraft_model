<svg width="100%" viewBox="0 0 680 960" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Tixcraft Model Pipeline - Traditional Chinese</title>
<desc>從合成圖生成、預訓練到微調的完整流程架構圖</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect x="20" y="40" width="640" height="200" rx="14" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="600" fill="#085041" x="340" y="68" text-anchor="middle">第一階段 — 資料準備</text>

<rect x="40" y="90" width="180" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="600" fill="#085041" x="130" y="113" text-anchor="middle" dominant-baseline="central">create_img.py</text>
<text font-family="sans-serif" font-size="12" fill="#0F6E56" x="130" y="133" text-anchor="middle" dominant-baseline="central">5萬張合成圖片</text>

<rect x="460" y="90" width="180" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="600" fill="#085041" x="550" y="113" text-anchor="middle" dominant-baseline="central">real_img/</text>
<text font-family="sans-serif" font-size="12" fill="#0F6E56" x="550" y="133" text-anchor="middle" dominant-baseline="central">1.5萬張真實圖片</text>

<rect x="240" y="90" width="200" height="56" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="600" fill="#2C2C2A" x="340" y="113" text-anchor="middle" dominant-baseline="central">dataset.py</text>
<text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="340" y="133" text-anchor="middle" dominant-baseline="central">調整大小至 32×128 與資料增強</text>

<line x1="220" y1="118" x2="235" y2="118" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="460" y1="118" x2="445" y2="118" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="40" y="175" width="100" height="44" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" font-weight="600" fill="#085041" x="90" y="197" text-anchor="middle" dominant-baseline="central">訓練集 (80%)</text>

<rect x="150" y="175" width="90" height="44" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" font-weight="600" fill="#085041" x="195" y="197" text-anchor="middle" dominant-baseline="central">驗證集 (10%)</text>

<rect x="250" y="175" width="90" height="44" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" font-weight="600" fill="#085041" x="295" y="197" text-anchor="middle" dominant-baseline="central">測試集 (10%)</text>

<rect x="460" y="175" width="180" height="44" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" font-weight="600" fill="#085041" x="550" y="197" text-anchor="middle" dominant-baseline="central">所有真實圖片</text>

<line x1="280" y1="146" x2="110" y2="172" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="320" y1="146" x2="210" y2="172" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="360" y1="146" x2="310" y2="172" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="550" y1="146" x2="550" y2="172" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<line x1="340" y1="240" x2="340" y2="265" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="20" y="270" width="640" height="420" rx="14" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="600" fill="#26215C" x="340" y="298" text-anchor="middle">第二階段 — 模型架構</text>

<rect x="200" y="320" width="280" height="44" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="600" fill="#2C2C2A" x="340" y="342" text-anchor="middle" dominant-baseline="central">輸入 (B, 1, 32, 128)</text>

<line x1="340" y1="364" x2="340" y2="385" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="180" y="390" width="320" height="56" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="600" fill="#26215C" x="340" y="413" text-anchor="middle" dominant-baseline="central">卷積神經網路 (CNN) 骨幹</text>
<text font-family="sans-serif" font-size="12" fill="#3C3489" x="340" y="433" text-anchor="middle" dominant-baseline="central">4個卷積區塊 → (B, 256, 1, 16)</text>

<line x1="340" y1="446" x2="340" y2="465" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="180" y="470" width="320" height="50" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="600" fill="#26215C" x="340" y="490" text-anchor="middle" dominant-baseline="central">Transformer 編碼器</text>
<text font-family="sans-serif" font-size="12" fill="#3C3489" x="340" y="508" text-anchor="middle" dominant-baseline="central">3層，維度為 256</text>

<line x1="340" y1="520" x2="340" y2="545" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="515" y="550" width="115" height="50" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="600" fill="#4A1B0C" x="572" y="570" text-anchor="middle" dominant-baseline="central">4個可學習</text>
<text font-family="sans-serif" font-size="12" fill="#712B13" x="572" y="588" text-anchor="middle" dominant-baseline="central">查詢參數</text>

<rect x="180" y="550" width="320" height="50" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="600" fill="#26215C" x="340" y="570" text-anchor="middle" dominant-baseline="central">Transformer 解碼器</text>
<text font-family="sans-serif" font-size="12" fill="#3C3489" x="340" y="588" text-anchor="middle" dominant-baseline="central">3層，交叉注意力機制</text>

<line x1="515" y1="575" x2="505" y2="575" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<line x1="340" y1="600" x2="340" y2="625" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="200" y="630" width="280" height="44" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="600" fill="#2C2C2A" x="340" y="652" text-anchor="middle" dominant-baseline="central">輸出 (4個位置 × 26個類別)</text>

<line x1="340" y1="690" x2="340" y2="715" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="20" y="720" width="640" height="210" rx="14" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="600" fill="#412402" x="340" y="748" text-anchor="middle">第三階段 — 模型訓練</text>
<text font-family="sans-serif" font-size="12" fill="#854F0B" x="340" y="768" text-anchor="middle">交叉熵損失函數 (4個位置加總)</text>

<rect x="40" y="780" width="260" height="60" rx="8" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="600" fill="#412402" x="170" y="803" text-anchor="middle" dominant-baseline="central">預訓練 (train.py)</text>
<text font-family="sans-serif" font-size="12" fill="#633806" x="170" y="823" text-anchor="middle" dominant-baseline="central">合成資料，50個訓練週期</text>

<rect x="380" y="780" width="240" height="60" rx="8" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="600" fill="#412402" x="500" y="803" text-anchor="middle" dominant-baseline="central">微調 (finetune.py)</text>
<text font-family="sans-serif" font-size="12" fill="#633806" x="500" y="823" text-anchor="middle" dominant-baseline="central">真實圖片，60個訓練週期</text>

<line x1="300" y1="810" x2="375" y2="810" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="40" y="870" width="260" height="44" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="600" fill="#2C2C2A" x="170" y="888" text-anchor="middle" dominant-baseline="central">best_pretrain.pth</text>
<text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="170" y="904" text-anchor="middle" dominant-baseline="central">最佳驗證集準確率</text>

<rect x="380" y="870" width="240" height="44" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="600" fill="#2C2C2A" x="500" y="888" text-anchor="middle" dominant-baseline="central">best_finetune.pth</text>
<text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="500" y="904" text-anchor="middle" dominant-baseline="central">最佳真實集準確率</text>

<line x1="170" y1="840" x2="170" y2="865" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="500" y1="840" x2="500" y2="865" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

</svg>
